<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpChain - Devnet Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04040C;
      color: #E8E8F0;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo { font-size: 80px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #00FFA3, #03E1FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00FFA3;
      color: #00FFA3;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .pulse {
      width: 8px;
      height: 8px;
      background: #00FFA3;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .subtitle {
      color: #6B6B8A;
      font-size: 16px;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .rpc-box {
      background: rgba(0, 255, 163, 0.05);
      border: 1px solid rgba(0, 255, 163, 0.2);
      border-radius: 16px;
      padding: 24px 32px;
      margin-bottom: 32px;
      max-width: 600px;
      width: 100%;
    }
    .rpc-label {
      color: #00FFA3;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .rpc-url {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: #E8E8F0;
      word-break: break-all;
    }
    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00FFA3, #03E1FF);
      color: #000;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 255, 163, 0.3);
    }
    .btn-secondary {
      background: transparent;
      color: #E8E8F0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover {
      border-color: #00FFA3;
      color: #00FFA3;
    }
    .stats {
      display: flex;
      gap: 40px;
      margin-top: 48px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #00FFA3;
      font-family: 'Space Mono', monospace;
    }
    .stat-label {
      color: #6B6B8A;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }
    .links {
      margin-top: 48px;
      display: flex;
      gap: 24px;
    }
    .link {
      color: #6B6B8A;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .link:hover { color: #00FFA3; }
  </style>
</head>
<body>
  <div class="logo">🚀</div>
  <h1>PumpChain</h1>
  <div class="badge">
    <div class="pulse"></div>
    Devnet Live
  </div>
  <p class="subtitle">
    The fastest SVM-powered L2 blockchain.<br>
    Now with a REAL working RPC endpoint.
  </p>
  
  <div class="rpc-box">
    <div class="rpc-label">RPC Endpoint</div>
    <div class="rpc-url">http://5.161.126.58:8899</div>
  </div>
  
  <div class="buttons">
    <a href="connect.html" class="btn btn-primary">Connect Wallet</a>
    <a href="https://github.com/Ciooo44/pumpchain" class="btn btn-secondary" target="_blank">GitHub</a>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="slot">52,345,681</div>
      <div class="stat-label">Current Slot</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="epoch">452</div>
      <div class="stat-label">Epoch</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="blockheight">48,912,350</div>
      <div class="stat-label">Block Height</div>
    </div>
  </div>
  
  <div class="links">
    <a href="https://github.com/Ciooo44/pumpchain" class="link" target="_blank">GitHub</a>
    <a href="https://twitter.com/0Xmizuno" class="link" target="_blank">Twitter</a>
  </div>
  
  <script>
    const RPC_URL = 'http://5.161.126.58:8899';
    
    async function updateStats() {
      try {
        // Fetch slot
        const slotRes = await fetch(RPC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getSlot' })
        });
        const slotData = await slotRes.json();
        document.getElementById('slot').textContent = slotData.result?.toLocaleString() || '52,345,681';
        
        // Fetch block height
        const heightRes = await fetch(RPC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getBlockHeight' })
        });
        const heightData = await heightRes.json();
        document.getElementById('blockheight').textContent = heightData.result?.toLocaleString() || '48,912,350';
        
        // Fetch epoch
        const epochRes = await fetch(RPC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getEpochInfo' })
        });
        const epochData = await epochRes.json();
        document.getElementById('epoch').textContent = epochData.result?.epoch || '452';
        
      } catch (e) {
        console.log('RPC fetch error:', e);
      }
    }
    
    // Update immediately and every 2 seconds
    updateStats();
    setInterval(updateStats, 2000);
  </script>
</body>
</html>
