<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpChain - In Development</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04040C;
      color: #E8E8F0;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo { font-size: 64px; margin-bottom: 24px; }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #00FFA3, #03E1FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #6B6B8A;
      font-size: 16px;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .status-box {
      background: rgba(0, 255, 163, 0.05);
      border: 1px solid rgba(0, 255, 163, 0.2);
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
    }
    .status-title {
      color: #00FFA3;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .phase-list {
      text-align: left;
    }
    .phase {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .phase:last-child { border-bottom: none; }
    .phase-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .done { background: #00FFA3; color: #000; }
    .pending { background: #6B6B8A; }
    .phase-text { font-size: 14px; }
    .phase-text.done { color: #E8E8F0; }
    .phase-text.pending { color: #6B6B8A; }
    .links {
      margin-top: 32px;
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .link {
      color: #6B6B8A;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .link:hover { color: #00FFA3; }
  </style>
</head>
<body>
  <div class="logo">🚀</div>
  <h1>PumpChain</h1>
  <p class="subtitle">
    The fastest SVM-powered L2 blockchain for DeFi and Gaming.<br>
    Currently in active development.
  </p>
  
  <div class="status-box">
    <div class="status-title">Development Status</div>
    <div class="phase-list">
      <div class="phase">
        <div class="phase-check done">✓</div>
        <div class="phase-text done">Website & Documentation</div>
      </div>
      <div class="phase">
        <div class="phase-check done">✓</div>
        <div class="phase-text done">Smart Contracts (Rust/Anchor)</div>
      </div>
      <div class="phase">
        <div class="phase-check done">✓</div>
        <div class="phase-text done">GitHub Repositories</div>
      </div>
      <div class="phase">
        <div class="phase-check pending"></div>
        <div class="phase-text pending">Validator Nodes (21 needed)</div>
      </div>
      <div class="phase">
        <div class="phase-check pending"></div>
        <div class="phase-text pending">Live RPC Endpoint</div>
      </div>
      <div class="phase">
        <div class="phase-check pending"></div>
        <div class="phase-text pending">Mainnet Launch</div>
      </div>
    </div>
  </div>
  
  <div class="links">
    <a href="https://github.com/Ciooo44/pumpchain" class="link" target="_blank">GitHub</a>
    <a href="https://twitter.com/0Xmizuno" class="link" target="_blank">Twitter</a>
  </div>
</body>
</html>
