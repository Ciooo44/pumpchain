<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpChain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 0.4em;
      color: #666;
      margin-bottom: 60px;
    }
    h1 {
      font-size: clamp(48px, 10vw, 100px);
      font-weight: 300;
      letter-spacing: -0.04em;
      text-align: center;
      margin-bottom: 30px;
    }
    .accent {
      background: linear-gradient(135deg, #00ffa3, #03e1ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 16px;
      color: #666;
      max-width: 400px;
      text-align: center;
      margin-bottom: 50px;
      line-height: 1.6;
    }
    .links {
      display: flex;
      gap: 20px;
      margin-bottom: 60px;
    }
    a {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 16px 32px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    a:hover {
      border-color: #00ffa3;
      color: #00ffa3;
    }
    .primary {
      background: #00ffa3;
      color: #0a0a0a;
      border-color: #00ffa3;
    }
    .primary:hover {
      background: transparent;
      color: #00ffa3;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 20px;
      color: #666;
      font-size: 12px;
      margin: 40px 0;
    }
    .divider::before, .divider::after {
      content: '';
      width: 60px;
      height: 1px;
      background: #333;
    }
    .stats {
      display: flex;
      gap: 60px;
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 300;
      color: #00ffa3;
    }
    .stat-label {
      font-size: 10px;
      color: #666;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .footer {
      position: fixed;
      bottom: 40px;
      display: flex;
      gap: 30px;
      font-size: 11px;
      color: #666;
      letter-spacing: 0.1em;
    }
    .footer a {
      padding: 0;
      border: none;
      color: #666;
    }
    @media (max-width: 768px) {
      .stats { gap: 30px; }
      .links { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="logo">PUMPCHAIN</div>
  
  <h1>The fastest<br><span class="accent">SVM L2</span></h1>
  
  <p>50,000+ TPS. Sub-400ms finality.<br>Built for DeFi and gaming.</p>
  
  <div class="links">
    <a href="launchpad.html" class="primary">Launch App</a>
    <a href="https://github.com/Ciooo44/pumpchain" target="_blank">GitHub</a>
  </div>
  
  <div class="divider">— / —</div>
  
  <div class="stats">
    <div>
      <div class="stat-value" id="slot">52.3M</div>
      <div class="stat-label">Current Slot</div>
    </div>
    <div>
      <div class="stat-value">50K+</div>
      <div class="stat-label">TPS</div>
    </div>
    <div>
      <div class="stat-value" id="block">48.9M</div>
      <div class="stat-label">Block Height</div>
    </div>
  </div>
  
  <div class="footer">
    <span style="color: #00ffa3;">●</span> Devnet Live
    <a href="https://github.com/Ciooo44/pumpchain" target="_blank">GitHub</a>
    <a href="https://twitter.com/0Xmizuno" target="_blank">Twitter</a>
  </div>
  
  <script>
    const RPC = 'https://databases-chief-patent-del.trycloudflare.com';
    async function update() {
      try {
        const s = await fetch(RPC, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getSlot'})});
        const sData = await s.json();
        document.getElementById('slot').textContent = ((sData.result||52345681)/1000000).toFixed(1)+'M';
        
        const b = await fetch(RPC, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getBlockHeight'})});
        const bData = await b.json();
        document.getElementById('block').textContent = ((bData.result||48912350)/1000000).toFixed(1)+'M';
      } catch(e) {}
    }
    update();
    setInterval(update, 5000);
  </script>
</body>
</html>
