<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpChain | Anime Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --neon-green: #00FFA3;
      --neon-cyan: #03E1FF;
      --neon-purple: #9945FF;
      --neon-pink: #FF3CAC;
      --bg-dark: #04040C;
      --bg-card: rgba(8,8,24,0.8);
    }
    
    body {
      background: var(--bg-dark);
      color: #E8E8F0;
      font-family: 'Orbitron', 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Anime Background Canvas */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    
    /* Scanlines Effect */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.1),
        rgba(0,0,0,0.1) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 1;
      pointer-events: none;
      animation: scanlineMove 10s linear infinite;
    }
    
    @keyframes scanlineMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }
    
    /* Glitch Effect */
    .glitch {
      position: relative;
    }
    
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch::before {
      animation: glitch-1 2s infinite linear alternate-reverse;
      color: var(--neon-cyan);
      z-index: -1;
    }
    
    .glitch::after {
      animation: glitch-2 3s infinite linear alternate-reverse;
      color: var(--neon-pink);
      z-index: -2;
    }
    
    @keyframes glitch-1 {
      0%, 100% { clip-path: inset(0 0 95% 0); transform: translate(-2px, 0); }
      20% { clip-path: inset(30% 0 50% 0); transform: translate(2px, 0); }
      40% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, 0); }
      60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, 0); }
      80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 0); }
    }
    
    @keyframes glitch-2 {
      0%, 100% { clip-path: inset(95% 0 0 0); transform: translate(2px, 0); }
      20% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, 0); }
      40% { clip-path: inset(30% 0 50% 0); transform: translate(2px, 0); }
      60% { clip-path: inset(5% 0 80% 0); transform: translate(-2px, 0); }
      80% { clip-path: inset(70% 0 10% 0); transform: translate(1px, 0); }
    }
    
    /* Main Container */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    
    /* Anime Logo */
    .logo-container {
      position: relative;
      margin-bottom: 30px;
    }
    
    .logo {
      font-size: 120px;
      animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 30px var(--neon-green));
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes glow {
      from { filter: drop-shadow(0 0 20px var(--neon-green)) drop-shadow(0 0 40px var(--neon-cyan)); }
      to { filter: drop-shadow(0 0 40px var(--neon-cyan)) drop-shadow(0 0 60px var(--neon-purple)); }
    }
    
    /* Particles around logo */
    .particles {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      pointer-events: none;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--neon-green);
      border-radius: 50%;
      animation: particle-float 3s ease-in-out infinite;
    }
    
    @keyframes particle-float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
      50% { transform: translate(var(--tx), var(--ty)) scale(0.5); opacity: 0.5; }
    }
    
    /* Title */
    h1 {
      font-size: 64px;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan), var(--neon-purple), var(--neon-pink));
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 3s ease infinite;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    /* Typing effect subtitle */
    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      color: var(--neon-cyan);
      margin-bottom: 40px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid var(--neon-cyan);
      animation: typing 3s steps(40) forwards, blink-caret 0.75s step-end infinite;
      width: 0;
    }
    
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; max-width: 500px; }
    }
    
    @keyframes blink-caret {
      50% { border-color: transparent; }
    }
    
    /* Neon Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 255, 163, 0.1);
      border: 2px solid var(--neon-green);
      color: var(--neon-green);
      padding: 12px 30px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 40px;
      box-shadow: 0 0 20px var(--neon-green), inset 0 0 20px rgba(0,255,163,0.2);
      animation: pulse-badge 2s infinite;
    }
    
    @keyframes pulse-badge {
      0%, 100% { box-shadow: 0 0 20px var(--neon-green), inset 0 0 20px rgba(0,255,163,0.2); }
      50% { box-shadow: 0 0 40px var(--neon-green), inset 0 0 30px rgba(0,255,163,0.4); }
    }
    
    .pulse-dot {
      width: 12px;
      height: 12px;
      background: var(--neon-green);
      border-radius: 50%;
      animation: pulse-dot 1.5s infinite;
    }
    
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.5); opacity: 0.5; }
    }
    
    /* Cyberpunk Buttons */
    .buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }
    
    .btn {
      position: relative;
      padding: 18px 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: none;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s;
      clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
      color: #000;
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s;
    }
    
    .btn-primary:hover::before {
      left: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 40px rgba(0,255,163,0.5);
    }
    
    .btn-secondary {
      background: transparent;
      color: #E8E8F0;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan), inset 0 0 10px rgba(3,225,255,0.1);
    }
    
    .btn-secondary:hover {
      background: rgba(3,225,255,0.1);
      box-shadow: 0 0 30px var(--neon-cyan), inset 0 0 20px rgba(3,225,255,0.2);
      transform: translateY(-3px);
    }
    
    /* Stats Cards */
    .stats {
      display: flex;
      gap: 30px;
      margin-top: 40px;
      perspective: 1000px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid rgba(0,255,163,0.2);
      border-radius: 16px;
      padding: 30px 40px;
      text-align: center;
      transform-style: preserve-3d;
      transition: transform 0.5s, box-shadow 0.5s;
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(0,255,163,0.1), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }
    
    @keyframes shine {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    
    .stat-card:hover {
      transform: rotateY(10deg) rotateX(5deg) translateZ(20px);
      box-shadow: 0 20px 60px rgba(0,255,163,0.3);
      border-color: var(--neon-green);
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 900;
      color: var(--neon-green);
      font-family: 'Orbitron', monospace;
      text-shadow: 0 0 20px var(--neon-green);
      animation: number-glow 2s infinite alternate;
    }
    
    @keyframes number-glow {
      from { text-shadow: 0 0 10px var(--neon-green); }
      to { text-shadow: 0 0 30px var(--neon-green), 0 0 60px var(--neon-cyan); }
    }
    
    .stat-label {
      color: #6B6B8A;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-top: 10px;
    }
    
    /* Footer Links */
    .links {
      display: flex;
      gap: 30px;
      margin-top: 50px;
    }
    
    .link {
      color: #6B6B8A;
      text-decoration: none;
      font-size: 14px;
      position: relative;
      transition: color 0.3s;
    }
    
    .link::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
      transition: width 0.3s;
    }
    
    .link:hover {
      color: var(--neon-green);
    }
    
    .link:hover::after {
      width: 100%;
    }
    
    /* Loading Animation */
    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin: 20px auto;
    }
    
    .loading-progress {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
      animation: loading 2s ease-in-out infinite;
    }
    
    @keyframes loading {
      0% { width: 0; left: 0; }
      50% { width: 100%; left: 0; }
      100% { width: 0; left: 100%; }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 36px; }
      .logo { font-size: 80px; }
      .stats { flex-direction: column; }
      .buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="scanlines"></div>
  
  <div class="container">
    <div class="logo-container">
      <div class="particles" id="particles"></div>
      <div class="logo">🚀</div>
    </div>
    
    <h1 class="glitch" data-text="PUMPCHAIN">PUMPCHAIN</h1>
    
    <div class="subtitle" id="subtitle">The fastest SVM-powered L2 blockchain...</div>
    
    <div class="badge">
      <div class="pulse-dot"></div>
      DEVNET LIVE
    </div>
    
    <div class="buttons">
      <a href="connect.html" class="btn btn-primary">⚡ Connect Wallet</a>
      <a href="launchpad.html" class="btn btn-secondary">🚀 Launchpad</a>
      <a href="bridge.html" class="btn btn-secondary">🌉 Bridge</a>
      <a href="explorer.html" class="btn btn-secondary">🔍 Explorer</a>
    </div>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="slot">52,345,681</div>
        <div class="stat-label">Current Slot</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="epoch">452</div>
        <div class="stat-label">Epoch</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="blockheight">48,912,350</div>
        <div class="stat-label">Block Height</div>
      </div>
    </div>
    
    <div class="links">
      <a href="roadmap.html" class="link">📅 Roadmap</a>
      <a href="https://github.com/Ciooo44/pumpchain" class="link" target="_blank">💻 GitHub</a>
      <a href="https://twitter.com/0Xmizuno" class="link" target="_blank">🐦 Twitter</a>
    </div>
  </div>
  
  <script>
    // Particle System
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.setProperty('--tx', `${(Math.random() - 0.5) * 200}px`);
        particle.style.setProperty('--ty', `${(Math.random() - 0.5) * 200}px`);
        particle.style.animationDelay = `${Math.random() * 3}s`;
        particle.style.left = '50%';
        particle.style.top = '50%';
        container.appendChild(particle);
      }
    }
    createParticles();
    
    // Three.js Background
    const canvas = document.getElementById('bg-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    
    // Create neon grid
    const gridHelper = new THREE.GridHelper(100, 50, 0x00FFA3, 0x03E1FF);
    gridHelper.position.y = -10;
    scene.add(gridHelper);
    
    // Create floating particles
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 1000;
    const posArray = new Float32Array(particlesCount * 3);
    
    for (let i = 0; i < particlesCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 100;
    }
    
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.1,
      color: 0x00FFA3,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });
    
    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);
    
    camera.position.z = 30;
    camera.position.y = 5;
    
    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      gridHelper.rotation.y += 0.001;
      particlesMesh.rotation.y += 0.0005;
      particlesMesh.rotation.x += 0.0002;
      
      // Pulse effect
      const time = Date.now() * 0.001;
      particlesMaterial.size = 0.1 + Math.sin(time) * 0.05;
      
      renderer.render(scene, camera);
    }
    animate();
    
    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // RPC Stats Update
    const RPC_URL = 'https://databases-chief-patent-del.trycloudflare.com';
    async function updateStats() {
      try {
        const slotRes = await fetch(RPC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getSlot' })
        });
        const slotData = await slotRes.json();
        document.getElementById('slot').textContent = slotData.result?.toLocaleString() || '52,345,681';
        
        const epochRes = await fetch(RPC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getEpochInfo' })
        });
        const epochData = await epochRes.json();
        document.getElementById('epoch').textContent = epochData.result?.epoch || '452';
        
        const heightRes = await fetch(RPC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getBlockHeight' })
        });
        const heightData = await heightRes.json();
        document.getElementById('blockheight').textContent = heightData.result?.toLocaleString() || '48,912,350';
      } catch (e) {
        console.log('RPC error:', e);
      }
    }
    
    updateStats();
    setInterval(updateStats, 2000);
    
    // Typing effect for subtitle
    const subtitle = document.getElementById('subtitle');
    const texts = [
      'The fastest SVM-powered L2 blockchain...',
      '50,000+ TPS | Sub-400ms finality...',
      'Create. Launch. Trade. PumpChain...'
    ];
    let textIndex = 0;
    
    setInterval(() => {
      textIndex = (textIndex + 1) % texts.length;
      subtitle.style.animation = 'none';
      subtitle.offsetHeight; // Trigger reflow
      subtitle.textContent = texts[textIndex];
      subtitle.style.animation = 'typing 3s steps(40) forwards, blink-caret 0.75s step-end infinite';
    }, 5000);
  </script>
</body>
</html>
