<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Wallet | PumpChain</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚀%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00FFA3;
      --cyan: #03E1FF;
      --purple: #9945FF;
      --pink: #FF3CAC;
      --bg: #04040C;
      --bg2: #080818;
      --bg3: #0D0D22;
      --border: rgba(0,255,163,0.12);
      --text: #E8E8F0;
      --muted: #6B6B8A;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0; opacity:.4;
    }
    
    .container {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    
    .logo-container {
      margin-bottom: 24px;
    }
    
    .logo-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .wallet-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .wallet-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 20px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    
    .wallet-btn:hover {
      border-color: var(--green);
      background: rgba(0,255,163,0.05);
      transform: translateY(-2px);
    }
    
    .wallet-btn.installed {
      border-color: var(--green);
    }
    
    .wallet-btn.installed::after {
      content: 'INSTALLED';
      position: absolute;
      right: 16px;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--green);
      background: rgba(0,255,163,0.1);
      padding: 4px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    
    .wallet-btn.connecting {
      opacity: 0.7;
      pointer-events: none;
    }
    
    .wallet-btn.connecting::after {
      content: '';
      position: absolute;
      right: 20px;
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .wallet-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    
    .backpack { background: linear-gradient(135deg, #E08D54, #C45C26); }
    .phantom { background: linear-gradient(135deg, #AB9FF2, #5346B3); }
    .solflare { background: linear-gradient(135deg, #FC744A, #F15A24); }
    .slope { background: linear-gradient(135deg, #00FFA3, #03E1FF); }
    
    .rpc-info {
      margin-top: 24px;
      padding: 16px;
      background: rgba(0,255,163,0.05);
      border: 1px solid rgba(0,255,163,0.2);
      border-radius: 10px;
      text-align: left;
    }
    
    .rpc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .rpc-label {
      color: var(--green);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .copy-btn {
      padding: 4px 10px;
      background: rgba(0,255,163,0.1);
      border: 1px solid rgba(0,255,163,0.2);
      border-radius: 6px;
      color: var(--green);
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .copy-btn:hover {
      background: rgba(0,255,163,0.2);
    }
    
    .copy-btn.copied {
      background: var(--green);
      color: #000;
    }
    
    .rpc-url {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.5;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    
    .back-link:hover {
      color: var(--green);
    }
    
    .footer-links {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    
    .footer-links a {
      color: var(--muted);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .footer-links a:hover {
      color: var(--green);
    }
    
    /* Setup Guide Modal */
    .guide-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    
    .guide-modal.show {
      display: flex;
    }
    
    .guide-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .guide-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .guide-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .guide-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px;
    }
    
    .guide-close:hover {
      color: var(--text);
    }
    
    .guide-body {
      padding: 24px;
      text-align: left;
    }
    
    .step {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    
    .step:last-child {
      margin-bottom: 0;
    }
    
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: #000;
      font-weight: 800;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .step-content h4 {
      font-size: 0.95rem;
      margin-bottom: 6px;
    }
    
    .step-content p {
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    
    .code-block {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--green);
      word-break: break-all;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .code-block:hover {
      border-color: var(--green);
    }
    
    .guide-actions {
      padding: 0 24px 24px;
      display: flex;
      gap: 12px;
    }
    
    .guide-btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    
    .guide-btn.primary {
      background: linear-gradient(135deg, var(--green), var(--cyan));
      color: #000;
    }
    
    .guide-btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .guide-btn:hover {
      transform: translateY(-2px);
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 32px 24px;
      }
      
      .wallet-btn.installed::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00FFA3"/>
            <stop offset="1" stop-color="#03E1FF"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="16" fill="url(#logoGrad)"/>
        <path d="M20 48V16H36C46 16 50 22 50 28C50 34 46 40 36 40H26V48H20Z" fill="#04040C"/>
        <path d="M26 24H35C40 24 42 26.5 42 28C42 29.5 40 32 35 32H26V24Z" fill="#00FFA3"/>
      </svg>
      <h1>Connect Wallet</h1>
      <p>Select your wallet to connect to PumpChain Mainnet</p>
    </div>

    <div class="wallet-list">
      <button class="wallet-btn" id="btn-backpack" onclick="connectWallet('backpack')">
        <div class="wallet-icon backpack">🎒</div>
        <span>Backpack</span>
      </button>

      <button class="wallet-btn" id="btn-phantom" onclick="connectWallet('phantom')">
        <div class="wallet-icon phantom">👻</div>
        <span>Phantom</span>
      </button>

      <button class="wallet-btn" id="btn-solflare" onclick="connectWallet('solflare')">
        <div class="wallet-icon solflare">☀️</div>
        <span>Solflare</span>
      </button>

      <button class="wallet-btn" id="btn-slope" onclick="connectWallet('slope')">
        <div class="wallet-icon slope">📈</div>
        <span>Slope</span>
      </button>
    </div>

    <div class="rpc-info">
      <div class="rpc-header">
        <span class="rpc-label">PumpChain Mainnet RPC</span>
        <button class="copy-btn" id="copyBtn" onclick="copyRpc()">COPY</button>
      </div>
      <div class="rpc-url" id="rpcUrl">https://mainnet.pumpchain.io</div>
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>
    
    <div class="footer-links">
      <a href="https://github.com/Ciooo44/pumpchain" target="_blank">📦 GitHub</a>
      <a href="https://twitter.com/0Xmizuno" target="_blank">🐦 Twitter</a>
    </div>
  </div>

  <!-- Setup Guide Modal -->
  <div class="guide-modal" id="guideModal">
    <div class="guide-content">
      <div class="guide-header">
        <div class="guide-title">
          <span id="guideIcon">🎒</span>
          <span id="guideWalletName">Backpack Setup</span>
        </div>
        <button class="guide-close" onclick="closeGuide()">&times;</button>
      </div>
      <div class="guide-body" id="guideBody">
        <!-- Dynamic content -->
      </div>
      <div class="guide-actions">
        <button class="guide-btn secondary" onclick="closeGuide()">Cancel</button>
        <button class="guide-btn primary" onclick="confirmConnect()">Connect</button>
      </div>
    </div>
  </div>

  <script>
    const RPC_URL = 'https://mainnet.pumpchain.io';
    let selectedWallet = null;
    let pendingConnection = null;
    
    const walletGuides = {
      backpack: {
        icon: '🎒',
        name: 'Backpack',
        steps: [
          {
            title: 'Open Backpack Extension',
            desc: 'Click the Backpack icon in your browser toolbar'
          },
          {
            title: 'Go to Settings',
            desc: 'Click the gear icon (⚙️) in the bottom right'
          },
          {
            title: 'Select Solana Network',
            desc: 'Choose "Solana" from the settings menu'
          },
          {
            title: 'Set Custom RPC',
            desc: 'Click "RPC Connection" → "Custom" and paste:',
            code: 'https://mainnet.pumpchain.io'
          },
          {
            title: 'Save & Connect',
            desc: 'Click Save. You\'re now connected to PumpChain!'
          }
        ]
      },
      phantom: {
        icon: '👻',
        name: 'Phantom',
        steps: [
          {
            title: 'Open Phantom Extension',
            desc: 'Click the Phantom icon in your browser toolbar'
          },
          {
            title: 'Go to Settings',
            desc: 'Click the hamburger menu (☰) → Settings'
          },
          {
            title: 'Developer Settings',
            desc: 'Scroll down and enable "Developer Mode"'
          },
          {
            title: 'Add Custom Network',
            desc: 'Click "Change Network" → "Add Custom Network"',
            code: 'Network Name: PumpChain Mainnet\nRPC URL: https://mainnet.pumpchain.io\nChain ID: 1397'
          },
          {
            title: 'Switch Network',
            desc: 'Select "PumpChain Mainnet" from the network dropdown'
          }
        ]
      },
      solflare: {
        icon: '☀️',
        name: 'Solflare',
        steps: [
          {
            title: 'Open Solflare',
            desc: 'Launch the Solflare wallet extension or app'
          },
          {
            title: 'Access Settings',
            desc: 'Click your profile icon → Settings'
          },
          {
            title: 'Network Settings',
            desc: 'Select "Network" from the settings menu'
          },
          {
            title: 'Add Custom Network',
            desc: 'Click "+" to add a new network and enter:',
            code: 'Name: PumpChain Mainnet\nRPC: https://mainnet.pumpchain.io\nChain ID: 1397'
          },
          {
            title: 'Activate Network',
            desc: 'Select PumpChain Mainnet and you\'re ready!'
          }
        ]
      },
      slope: {
        icon: '📈',
        name: 'Slope',
        steps: [
          {
            title: 'Open Slope Wallet',
            desc: 'Launch the Slope wallet extension'
          },
          {
            title: 'Settings Menu',
            desc: 'Click the settings icon in the top right'
          },
          {
            title: 'Network Configuration',
            desc: 'Go to "Network" → "Custom RPC"'
          },
          {
            title: 'Enter RPC Details',
            desc: 'Input the following information:',
            code: 'Network: PumpChain Mainnet\nRPC URL: https://mainnet.pumpchain.io'
          },
          {
            title: 'Save Configuration',
            desc: 'Click Save to connect to PumpChain'
          }
        ]
      }
    };
    
    // Auto-detect installed wallets
    window.addEventListener('load', function() {
      const hasBackpack = window.backpack?.solana || window.backpack;
      const hasPhantom = window.phantom?.solana || window.solana?.isPhantom;
      const hasSolflare = window.solflare?.solana || window.solflare;
      const hasSlope = window.slope || window.slopeWallet;
      
      if (hasBackpack) document.getElementById('btn-backpack').classList.add('installed');
      if (hasPhantom) document.getElementById('btn-phantom').classList.add('installed');
      if (hasSolflare) document.getElementById('btn-solflare').classList.add('installed');
      if (hasSlope) document.getElementById('btn-slope').classList.add('installed');
    });
    
    function connectWallet(wallet) {
      selectedWallet = wallet;
      const btn = document.getElementById('btn-' + wallet);
      
      // Show loading state
      btn.classList.add('connecting');
      
      // Simulate connection attempt
      setTimeout(() => {
        btn.classList.remove('connecting');
        showGuide(wallet);
      }, 500);
    }
    
    function showGuide(wallet) {
      const guide = walletGuides[wallet];
      pendingConnection = wallet;
      
      document.getElementById('guideIcon').textContent = guide.icon;
      document.getElementById('guideWalletName').textContent = guide.name + ' Setup';
      
      document.getElementById('guideBody').innerHTML = guide.steps.map((step, i) => `
        <div class="step">
          <div class="step-num">${i + 1}</div>
          <div class="step-content">
            <h4>${step.title}</h4>
            <p>${step.desc}</p>
            ${step.code ? `<div class="code-block" onclick="copyToClipboard('${step.code.replace(/\n/g, '\\n')}')">${step.code}<br><small style="color: var(--muted);">Click to copy</small></div>` : ''}
          </div>
        </div>
      `).join('');
      
      document.getElementById('guideModal').classList.add('show');
    }
    
    function closeGuide() {
      document.getElementById('guideModal').classList.remove('show');
      pendingConnection = null;
    }
    
    function confirmConnect() {
      if (!pendingConnection) return;
      
      // Generate mock wallet address
      const address = '0x' + Array(40).fill(0).map(() => 
        Math.floor(Math.random() * 16).toString(16)
      ).join('');
      
      // Store connection
      localStorage.setItem('pumpchain_wallet', JSON.stringify({
        type: pendingConnection,
        address: address,
        connected: true
      }));
      
      // Notify opener if popup
      if (window.opener) {
        window.opener.postMessage({
          type: 'WALLET_CONNECTED',
          wallet: pendingConnection,
          address: address
        }, '*');
      }
      
      // Show success and close
      alert(`✅ ${walletGuides[pendingConnection].name} connected successfully!\n\nAddress: ${address.slice(0, 10)}...${address.slice(-8)}`);
      
      // Redirect to home or close
      if (window.opener) {
        window.close();
      } else {
        window.location.href = 'index.html';
      }
    }
    
    function copyRpc() {
      navigator.clipboard.writeText(RPC_URL);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'COPIED!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'COPY';
        btn.classList.remove('copied');
      }, 2000);
    }
    
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text.replace(/\\n/g, '\n'));
      alert('📋 Copied to clipboard!');
    }
    
    // Listen for messages from parent window
    window.addEventListener('message', function(e) {
      if (e.data.type === 'REQUEST_CONNECTION') {
        // Handle connection request
      }
    });
  </script>
</body>
</html>
