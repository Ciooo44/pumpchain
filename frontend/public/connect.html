<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Wallet | PumpChain</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04040C;
      color: #E8E8F0;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #080818;
      border: 1px solid rgba(0, 255, 163, 0.12);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #00FFA3, #03E1FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #6B6B8A; margin-bottom: 32px; font-size: 14px; }
    .status-box {
      background: rgba(0, 255, 163, 0.05);
      border: 1px solid rgba(0, 255, 163, 0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .status-text {
      color: #00FFA3;
      font-size: 14px;
      font-weight: 600;
    }
    .wallet-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .wallet-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 20px;
      background: #0D0D22;
      border: 1px solid rgba(0, 255, 163, 0.12);
      border-radius: 12px;
      color: #E8E8F0;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .wallet-btn:hover {
      border-color: #00FFA3;
      background: rgba(0, 255, 163, 0.05);
    }
    .wallet-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .wallet-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .phantom { background: linear-gradient(135deg, #AB9FF2, #5346B3); }
    .backpack { background: linear-gradient(135deg, #E08D54, #C45C26); }
    .solflare { background: linear-gradient(135deg, #FC744A, #F15A24); }
    
    .connected-box {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00FFA3;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      display: none;
    }
    .connected-box.show { display: block; }
    .address {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: #00FFA3;
      word-break: break-all;
    }
    .balance {
      font-size: 24px;
      font-weight: 700;
      color: #E8E8F0;
      margin-top: 8px;
    }
    .disconnect-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #6B6B8A;
      padding: 8px 16px;
      border-radius: 8px;
      margin-top: 16px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
    }
    .disconnect-btn:hover {
      border-color: #FF3CAC;
      color: #FF3CAC;
    }
    .error-box {
      background: rgba(255, 60, 172, 0.1);
      border: 1px solid rgba(255, 60, 172, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      color: #FF3CAC;
      font-size: 14px;
      display: none;
    }
    .error-box.show { display: block; }
    .back-link {
      display: inline-block;
      color: #6B6B8A;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #00FFA3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🚀</div>
    <h1>Connect Wallet</h1>
    <p id="statusText">Select your wallet to connect to PumpChain</p>
    
    <div class="status-box" id="rpcStatus">
      <div class="status-text">⏳ Checking RPC...</div>
    </div>
    
    <div class="error-box" id="errorBox">
      ⚠️ <span id="errorText"></span>
    </div>
    
    <div class="connected-box" id="connectedBox">
      <div class="address" id="walletAddress"></div>
      <div class="balance" id="walletBalance">0 PUMP</div>
      <button class="disconnect-btn" onclick="disconnectWallet()">Disconnect</button>
    </div>
    
    <div class="wallet-list" id="walletList">
      <button class="wallet-btn" id="phantomBtn" onclick="connectPhantom()">
        <div class="wallet-icon phantom">👻</div>
        <span>Phantom</span>
      </button>
      <button class="wallet-btn" id="backpackBtn" onclick="connectBackpack()">
        <div class="wallet-icon backpack">🎒</div>
        <span>Backpack</span>
      </button>
      <button class="wallet-btn" id="solflareBtn" onclick="connectSolflare()">
        <div class="wallet-icon solflare">☀️</div>
        <span>Solflare</span>
      </button>
    </div>
    
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>
  
  <script>
    const RPC_URL = 'https://databases-chief-patent-del.trycloudflare.com';
    let connection = null;
    let currentWallet = null;
    
    // Check RPC on load
    async function checkRPC() {
      try {
        const response = await fetch(RPC_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getHealth' })
        });
        const data = await response.json();
        if (data.result === 'ok') {
          document.getElementById('rpcStatus').innerHTML = '<div class="status-text">✅ PumpChain RPC Connected</div>';
          connection = new solanaWeb3.Connection(RPC_URL, 'confirmed');
        } else {
          throw new Error('RPC not healthy');
        }
      } catch (e) {
        document.getElementById('rpcStatus').innerHTML = '<div class="status-text" style="color: #FF3CAC;">❌ RPC Connection Failed</div>';
      }
    }
    
    // Connect Phantom
    async function connectPhantom() {
      try {
        const provider = window.phantom?.solana;
        
        if (!provider) {
          showError('Phantom not found. Please install Phantom extension.');
          return;
        }
        
        // This triggers the popup
        const response = await provider.connect();
        const publicKey = response.publicKey.toString();
        
        currentWallet = { provider, name: 'Phantom', publicKey };
        await onConnected(publicKey);
        
      } catch (err) {
        console.error('Phantom connection error:', err);
        showError(err.message || 'Failed to connect to Phantom');
      }
    }
    
    // Connect Backpack
    async function connectBackpack() {
      try {
        const provider = window.backpack?.solana || window.backpack;
        
        if (!provider) {
          showError('Backpack not found. Please install Backpack extension.');
          return;
        }
        
        const response = await provider.connect();
        const publicKey = response.publicKey?.toString() || provider.publicKey?.toString();
        
        currentWallet = { provider, name: 'Backpack', publicKey };
        await onConnected(publicKey);
        
      } catch (err) {
        console.error('Backpack connection error:', err);
        showError(err.message || 'Failed to connect to Backpack');
      }
    }
    
    // Connect Solflare
    async function connectSolflare() {
      try {
        const provider = window.solflare;
        
        if (!provider) {
          showError('Solflare not found. Please install Solflare extension.');
          return;
        }
        
        await provider.connect();
        const publicKey = provider.publicKey.toString();
        
        currentWallet = { provider, name: 'Solflare', publicKey };
        await onConnected(publicKey);
        
      } catch (err) {
        console.error('Solflare connection error:', err);
        showError(err.message || 'Failed to connect to Solflare');
      }
    }
    
    async function onConnected(publicKey) {
      document.getElementById('walletList').style.display = 'none';
      document.getElementById('statusText').textContent = `Connected with ${currentWallet.name}`;
      document.getElementById('connectedBox').classList.add('show');
      document.getElementById('walletAddress').textContent = publicKey;
      
      // Get balance
      if (connection) {
        try {
          const balance = await connection.getBalance(new solanaWeb3.PublicKey(publicKey));
          document.getElementById('walletBalance').textContent = (balance / 1000000000).toFixed(4) + ' PUMP';
        } catch (e) {
          document.getElementById('walletBalance').textContent = '0 PUMP';
        }
      }
      
      hideError();
    }
    
    function disconnectWallet() {
      if (currentWallet?.provider?.disconnect) {
        currentWallet.provider.disconnect();
      }
      currentWallet = null;
      document.getElementById('walletList').style.display = 'flex';
      document.getElementById('statusText').textContent = 'Select your wallet to connect to PumpChain';
      document.getElementById('connectedBox').classList.remove('show');
    }
    
    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorBox').classList.add('show');
    }
    
    function hideError() {
      document.getElementById('errorBox').classList.remove('show');
    }
    
    // Check RPC on page load
    checkRPC();
  </script>
</body>
</html>
