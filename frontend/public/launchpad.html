<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launch Token | PumpChain</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }
    .logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #00ffa3;
    }
    h1 {
      font-size: 24px;
      font-weight: 400;
    }
    h1 span {
      color: #00ffa3;
    }
    .devnet-badge {
      background: rgba(255, 165, 0, 0.1);
      color: #ffa500;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 165, 0, 0.3);
    }
    .card {
      background: #111;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .connect-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00ffa3, #03e1ff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .connect-btn:hover {
      opacity: 0.9;
    }
    .wallet-connected {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00ffa3;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .wallet-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .wallet-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #00ffa3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
    }
    .wallet-address {
      font-family: monospace;
      font-size: 14px;
    }
    .wallet-name {
      font-size: 12px;
      color: #888;
    }
    .disconnect-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .disconnect-btn:hover {
      border-color: #ff4444;
      color: #ff4444;
    }
    .wallet-options {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .wallet-options.show {
      display: grid;
    }
    .wallet-option {
      padding: 20px 15px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
    }
    .wallet-option:hover {
      border-color: #00ffa3;
      background: rgba(0, 255, 163, 0.05);
    }
    .wallet-option-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .wallet-option-name {
      font-size: 13px;
      font-weight: 500;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
    }
    input:focus {
      outline: none;
      border-color: #00ffa3;
    }
    input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00ffa3, #03e1ff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #333;
    }
    .btn.loading {
      pointer-events: none;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .success-msg {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00ffa3;
      border-radius: 12px;
      padding: 24px;
      margin-top: 20px;
      text-align: center;
      display: none;
    }
    .success-msg.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .tx-hash {
      font-family: monospace;
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 13px;
      color: #00ffa3;
    }
    .error-msg {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid #ff4444;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      color: #ff4444;
      font-size: 14px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="logo.jpg" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h1>Launch <span>Token</span></h1>
    </div>
    
    <div class="devnet-badge">⚠️ Devnet — Tokens are simulated until mainnet launch</div>
    
    <div class="card">
      <button class="connect-btn" id="connectBtn" onclick="showWalletOptions()">
        🔌 Connect Wallet
      </button>
      
      <div class="wallet-connected" id="walletConnected" style="display: none;">
        <div class="wallet-info">
          <div class="wallet-icon" id="walletIcon">👻</div>
          <div>
            <div class="wallet-address" id="walletAddress">Not connected</div>
            <div class="wallet-name" id="walletName">Select a wallet</div>
          </div>
        </div>
        <button class="disconnect-btn" onclick="disconnectWallet()">Disconnect</button>
      </div>
      
      <div class="wallet-options" id="walletOptions">
        <div class="wallet-option" onclick="connectPhantom()">
          <div class="wallet-option-icon">👻</div>
          <div class="wallet-option-name">Phantom</div>
        </div>
        <div class="wallet-option" onclick="connectBackpack()">
          <div class="wallet-option-icon">🎒</div>
          <div class="wallet-option-name">Backpack</div>
        </div>
        <div class="wallet-option" onclick="connectSolflare()">
          <div class="wallet-option-icon">☀️</div>
          <div class="wallet-option-name">Solflare</div>
        </div>
      </div>
      
      <div class="error-msg" id="errorMsg"></div>
      
      <form id="launchForm">
        <div class="form-group">
          <label>Token Name *</label>
          <input type="text" id="tokenName" placeholder="e.g., Moon Token" required disabled>
        </div>
        
        <div class="form-group">
          <label>Symbol *</label>
          <input type="text" id="tokenSymbol" placeholder="MOON" maxlength="8" required disabled>
        </div>
        
        <div class="form-group">
          <label>Total Supply *</label>
          <input type="number" id="tokenSupply" placeholder="1000000000" value="1000000000" required disabled>
        </div>
        
        <button type="submit" class="btn" id="launchBtn" disabled>
          🚀 Launch Token
        </button>
      </form>
      
      <div class="success-msg" id="successMsg">
        <div class="success-icon">🎉</div>
        <h3 style="color: #00ffa3; margin-bottom: 10px;">Token Created!</h3>
        <p style="color: #888; margin-bottom: 15px;">Your token has been deployed on PumpChain devnet</p>
        <div class="tx-hash" id="txHash"></div>
        <button class="btn" onclick="copyTxHash()" style="margin-top: 10px;">Copy Address</button>
      </div>
    </div>
  </div>

  <script>
    let wallet = null;
    let walletName = '';
    let createdTx = null;
    
    function showWalletOptions() {
      if (wallet) return;
      document.getElementById('walletOptions').classList.add('show');
      document.getElementById('connectBtn').style.display = 'none';
    }
    
    async function connectPhantom() {
      if (!window.phantom?.solana) {
        showError('Phantom not found! Install from phantom.app');
        window.open('https://phantom.app', '_blank');
        return;
      }
      try {
        await window.phantom.solana.connect();
        wallet = window.phantom.solana;
        walletName = 'Phantom';
        updateWalletUI('👻');
      } catch (e) {
        showError('Connection failed: ' + e.message);
      }
    }
    
    async function connectBackpack() {
      if (!window.backpack?.solana) {
        showError('Backpack not found! Install from backpack.app');
        window.open('https://backpack.app', '_blank');
        return;
      }
      try {
        await window.backpack.solana.connect();
        wallet = window.backpack.solana;
        walletName = 'Backpack';
        updateWalletUI('🎒');
      } catch (e) {
        showError('Connection failed: ' + e.message);
      }
    }
    
    async function connectSolflare() {
      if (!window.solflare) {
        showError('Solflare not found! Install from solflare.com');
        window.open('https://solflare.com', '_blank');
        return;
      }
      try {
        await window.solflare.connect();
        wallet = window.solflare;
        walletName = 'Solflare';
        updateWalletUI('☀️');
      } catch (e) {
        showError('Connection failed: ' + e.message);
      }
    }
    
    function updateWalletUI(icon) {
      const address = wallet.publicKey?.toString();
      const shortAddress = address.slice(0, 4) + '...' + address.slice(-4);
      
      document.getElementById('walletOptions').classList.remove('show');
      document.getElementById('connectBtn').style.display = 'none';
      document.getElementById('walletConnected').style.display = 'flex';
      document.getElementById('walletIcon').textContent = icon;
      document.getElementById('walletAddress').textContent = shortAddress;
      document.getElementById('walletName').textContent = walletName;
      
      // Enable form
      document.getElementById('tokenName').disabled = false;
      document.getElementById('tokenSymbol').disabled = false;
      document.getElementById('tokenSupply').disabled = false;
      document.getElementById('launchBtn').disabled = false;
      
      clearError();
    }
    
    function disconnectWallet() {
      wallet = null;
      walletName = '';
      document.getElementById('walletConnected').style.display = 'none';
      document.getElementById('connectBtn').style.display = 'flex';
      document.getElementById('tokenName').disabled = true;
      document.getElementById('tokenSymbol').disabled = true;
      document.getElementById('tokenSupply').disabled = true;
      document.getElementById('launchBtn').disabled = true;
    }
    
    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.classList.add('show');
    }
    
    function clearError() {
      document.getElementById('errorMsg').classList.remove('show');
    }
    
    // Check for auto-connect on load
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (window.phantom?.solana?.isConnected) {
          connectPhantom();
        } else if (window.backpack?.solana?.isConnected) {
          connectBackpack();
        } else if (window.solflare?.isConnected) {
          connectSolflare();
        }
      }, 500);
    });
    
    document.getElementById('launchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!wallet || !wallet.publicKey) {
        showError('Please connect wallet first!');
        return;
      }
      
      const name = document.getElementById('tokenName').value.trim();
      const symbol = document.getElementById('tokenSymbol').value.trim();
      const supply = document.getElementById('tokenSupply').value;
      
      if (!name || !symbol || !supply) {
        showError('Please fill all required fields');
        return;
      }
      
      const btn = document.getElementById('launchBtn');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.innerHTML = '<div class="spinner"></div> Creating Token...';
      
      // Simulate 2s delay
      await new Promise(r => setTimeout(r, 2000));
      
      // Generate fake tx hash
      createdTx = 'pump' + Math.random().toString(36).substring(2, 34);
      
      document.getElementById('txHash').textContent = createdTx;
      document.getElementById('successMsg').classList.add('show');
      document.getElementById('launchForm').reset();
      
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.innerHTML = '🚀 Launch Token';
    });
    
    function copyTxHash() {
      if (createdTx) {
        navigator.clipboard.writeText(createdTx);
        alert('Copied: ' + createdTx);
      }
    }
  </script>
</body>
</html>
