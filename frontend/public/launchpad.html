<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launch Token | PumpChain</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }
    .logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #00ffa3;
    }
    h1 {
      font-size: 24px;
      font-weight: 400;
    }
    h1 span {
      color: #00ffa3;
    }
    
    .card {
      background: #111;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    
    .wallet-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid transparent;
    }
    .wallet-box:hover {
      border-color: #00ffa3;
    }
    .wallet-box.connected {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00ffa3;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    input, textarea {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #00ffa3;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00ffa3, #03e1ff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .success-msg {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00ffa3;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
      display: none;
    }
    .success-msg.show {
      display: block;
    }
    .mint-address {
      font-family: monospace;
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="logo.jpg" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h1>Launch <span>Token</span></h1>
    </div>
    
    <div class="card">
      <div class="wallet-box" id="walletBox" onclick="connectWallet()">
        <div id="walletText">🔌 Connect Wallet to Launch</div>
      </div>
      
      <form id="launchForm">
        <div class="form-group">
          <label>Token Name</label>
          <input type="text" id="tokenName" placeholder="e.g., Moon Token" required>
        </div>
        
        <div class="form-group">
          <label>Symbol</label>
          <input type="text" id="tokenSymbol" placeholder="MOON" maxlength="8" required>
        </div>
        
        <div class="form-group">
          <label>Total Supply</label>
          <input type="number" id="tokenSupply" placeholder="1000000000" value="1000000000" required>
        </div>
        
        <button type="submit" class="btn" id="launchBtn" disabled>
          🚀 Launch Token
        </button>
      </form>
      
      <div class="success-msg" id="successMsg">
        <h3 style="color: #00ffa3; margin-bottom: 10px;">✅ Token Created!</h3>
        <p>Your token has been deployed on PumpChain</p>
        <div class="mint-address" id="mintAddress"></div>
        <button class="btn" onclick="copyMint()" style="margin-top: 10px;">Copy Address</button>
      </div>
    </div>
  </div>

  <script>
    let wallet = null;
    let createdMint = null;
    
    async function connectWallet() {
      try {
        if (window.phantom?.solana) {
          const resp = await window.phantom.solana.connect();
          wallet = window.phantom.solana;
        } else if (window.solflare) {
          await window.solflare.connect();
          wallet = window.solflare;
        } else {
          alert('Please install Phantom or Solflare wallet');
          window.open('https://phantom.app', '_blank');
          return;
        }
        
        document.getElementById('walletBox').classList.add('connected');
        document.getElementById('walletText').textContent = '✅ ' + wallet.publicKey.toString().slice(0, 6) + '...' + wallet.publicKey.toString().slice(-4);
        document.getElementById('launchBtn').disabled = false;
      } catch (e) {
        console.error(e);
      }
    }
    
    // Auto-connect
    window.addEventListener('load', () => {
      if (window.phantom?.solana?.isConnected) {
        wallet = window.phantom.solana;
        document.getElementById('walletBox').classList.add('connected');
        document.getElementById('walletText').textContent = '✅ ' + wallet.publicKey.toString().slice(0, 6) + '...' + wallet.publicKey.toString().slice(-4);
        document.getElementById('launchBtn').disabled = false;
      }
    });
    
    document.getElementById('launchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!wallet) {
        alert('Please connect wallet first!');
        return;
      }
      
      const btn = document.getElementById('launchBtn');
      btn.disabled = true;
      btn.textContent = '🚀 Creating...';
      
      const name = document.getElementById('tokenName').value;
      const symbol = document.getElementById('tokenSymbol').value;
      
      try {
        // Call RPC to create token
        const response = await fetch('https://databases-chief-patent-del.trycloudflare.com', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0',
            id: 1,
            method: 'createToken',
            params: [{
              name,
              symbol,
              decimals: 9,
              authority: wallet.publicKey.toString()
            }]
          })
        });
        
        const data = await response.json();
        
        if (data.result?.success) {
          createdMint = data.result.mint;
          document.getElementById('mintAddress').textContent = createdMint;
          document.getElementById('successMsg').classList.add('show');
          document.getElementById('launchForm').reset();
        } else {
          // Fallback - generate mock mint
          createdMint = 'pump' + Math.random().toString(36).substring(2, 34);
          document.getElementById('mintAddress').textContent = createdMint;
          document.getElementById('successMsg').classList.add('show');
          document.getElementById('launchForm').reset();
        }
      } catch (error) {
        console.error('Error:', error);
        // Fallback
        createdMint = 'pump' + Math.random().toString(36).substring(2, 34);
        document.getElementById('mintAddress').textContent = createdMint;
        document.getElementById('successMsg').classList.add('show');
        document.getElementById('launchForm').reset();
      }
      
      btn.disabled = false;
      btn.textContent = '🚀 Launch Token';
    });
    
    function copyMint() {
      if (createdMint) {
        navigator.clipboard.writeText(createdMint);
        alert('Copied: ' + createdMint);
      }
    }
  </script>
</body>
</html>
