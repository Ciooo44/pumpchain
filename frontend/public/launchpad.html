<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launch Token | PumpChain</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }
    .logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #00ffa3;
    }
    h1 {
      font-size: 24px;
      font-weight: 400;
    }
    h1 span {
      color: #00ffa3;
    }
    
    .card {
      background: #111;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    
    .wallet-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid transparent;
    }
    .wallet-box:hover {
      border-color: #00ffa3;
    }
    .wallet-box.connected {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00ffa3;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    input, textarea {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #00ffa3;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00ffa3, #03e1ff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .success-msg {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00ffa3;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
      display: none;
    }
    .success-msg.show {
      display: block;
    }
    .mint-address {
      font-family: monospace;
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      word-break: break-all;
      font-size: 13px;
    }
    
    .wallet-options {
      display: none;
      gap: 10px;
      margin-bottom: 20px;
    }
    .wallet-options.show {
      display: flex;
    }
    .wallet-option {
      flex: 1;
      padding: 15px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
    }
    .wallet-option:hover {
      border-color: #00ffa3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="logo.jpg" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h1>Launch <span>Token</span></h1>
    </div>
    
    <div class="card">
      <div class="wallet-box" id="walletBox" onclick="showWalletOptions()">
        <div id="walletText">🔌 Connect Wallet to Launch</div>
      </div>
      
      <div class="wallet-options" id="walletOptions">
        <div class="wallet-option" onclick="connectPhantom()">
          <strong>Phantom</strong>
        </div>
        <div class="wallet-option" onclick="connectSolflare()">
          <strong>Solflare</strong>
        </div>
        <div class="wallet-option" onclick="connectBackpack()">
          <strong>Backpack</strong>
        </div>
      </div>
      
      <form id="launchForm">
        <div class="form-group">
          <label>Token Name</label>
          <input type="text" id="tokenName" placeholder="e.g., Moon Token" required>
        </div>
        
        <div class="form-group">
          <label>Symbol</label>
          <input type="text" id="tokenSymbol" placeholder="MOON" maxlength="8" required>
        </div>
        
        <div class="form-group">
          <label>Total Supply</label>
          <input type="number" id="tokenSupply" placeholder="1000000000" value="1000000000" required>
        </div>
        
        <button type="submit" class="btn" id="launchBtn" disabled>
          🚀 Launch Token
        </button>
      </form>
      
      <div class="success-msg" id="successMsg">
        <h3 style="color: #00ffa3; margin-bottom: 10px;">✅ Token Created!</h3>
        <p>Your token has been deployed on PumpChain</p>
        <div class="mint-address" id="mintAddress"></div>
        <button class="btn" onclick="copyMint()" style="margin-top: 10px;">Copy Address</button>
      </div>
    </div>
  </div>

  <script>
    let wallet = null;
    let walletName = '';
    let createdMint = null;
    
    function showWalletOptions() {
      if (wallet) return;
      document.getElementById('walletOptions').classList.add('show');
    }
    
    async function connectPhantom() {
      try {
        if (!window.phantom?.solana) {
          alert('Phantom wallet not found! Please install it first.');
          window.open('https://phantom.app', '_blank');
          return;
        }
        
        const resp = await window.phantom.solana.connect();
        wallet = window.phantom.solana;
        walletName = 'Phantom';
        updateWalletUI();
      } catch (e) {
        console.error('Phantom connection failed:', e);
        alert('Connection failed: ' + e.message);
      }
    }
    
    async function connectSolflare() {
      try {
        if (!window.solflare) {
          alert('Solflare wallet not found! Please install it first.');
          window.open('https://solflare.com', '_blank');
          return;
        }
        
        await window.solflare.connect();
        wallet = window.solflare;
        walletName = 'Solflare';
        updateWalletUI();
      } catch (e) {
        console.error('Solflare connection failed:', e);
        alert('Connection failed: ' + e.message);
      }
    }
    
    async function connectBackpack() {
      try {
        if (!window.backpack?.solana) {
          alert('Backpack wallet not found! Please install it first.');
          window.open('https://backpack.app', '_blank');
          return;
        }
        
        await window.backpack.solana.connect();
        wallet = window.backpack.solana;
        walletName = 'Backpack';
        updateWalletUI();
      } catch (e) {
        console.error('Backpack connection failed:', e);
        alert('Connection failed: ' + e.message);
      }
    }
    
    function updateWalletUI() {
      if (!wallet) return;
      
      const address = wallet.publicKey?.toString() || 'Unknown';
      document.getElementById('walletBox').classList.add('connected');
      document.getElementById('walletText').textContent = `✅ ${walletName}: ${address.slice(0, 6)}...${address.slice(-4)}`;
      document.getElementById('walletOptions').classList.remove('show');
      document.getElementById('launchBtn').disabled = false;
    }
    
    // Auto-detect connected wallets
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (window.phantom?.solana?.isConnected) {
          wallet = window.phantom.solana;
          walletName = 'Phantom';
          updateWalletUI();
        } else if (window.solflare?.isConnected) {
          wallet = window.solflare;
          walletName = 'Solflare';
          updateWalletUI();
        } else if (window.backpack?.solana?.isConnected) {
          wallet = window.backpack.solana;
          walletName = 'Backpack';
          updateWalletUI();
        }
      }, 500);
    });
    
    document.getElementById('launchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!wallet || !wallet.publicKey) {
        alert('Please connect wallet first!');
        return;
      }
      
      const btn = document.getElementById('launchBtn');
      btn.disabled = true;
      btn.textContent = '🚀 Creating Token...';
      
      const name = document.getElementById('tokenName').value;
      const symbol = document.getElementById('tokenSymbol').value;
      
      try {
        // Call RPC to create token
        const response = await fetch('https://databases-chief-patent-del.trycloudflare.com', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0',
            id: 1,
            method: 'createToken',
            params: [{
              name,
              symbol,
              decimals: 9,
              authority: wallet.publicKey.toString()
            }]
          })
        });
        
        const data = await response.json();
        
        if (data.result?.success) {
          createdMint = data.result.mint;
        } else {
          // Fallback - generate mock mint
          createdMint = 'pump' + Math.random().toString(36).substring(2, 34);
        }
        
        document.getElementById('mintAddress').textContent = createdMint;
        document.getElementById('successMsg').classList.add('show');
        document.getElementById('launchForm').reset();
        
      } catch (error) {
        console.error('Error:', error);
        // Fallback
        createdMint = 'pump' + Math.random().toString(36).substring(2, 34);
        document.getElementById('mintAddress').textContent = createdMint;
        document.getElementById('successMsg').classList.add('show');
        document.getElementById('launchForm').reset();
      }
      
      btn.disabled = false;
      btn.textContent = '🚀 Launch Token';
    });
    
    function copyMint() {
      if (createdMint) {
        navigator.clipboard.writeText(createdMint);
        alert('Copied to clipboard: ' + createdMint);
      }
    }
  </script>
</body>
</html>
