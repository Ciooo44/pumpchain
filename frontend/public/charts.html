<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charts | PumpScan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #00ffa3;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }
    .logo-text span {
      color: #00ffa3;
    }
    .nav {
      display: flex;
      gap: 25px;
    }
    .nav a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }
    .nav a:hover, .nav a.active {
      color: #00ffa3;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px;
    }
    h1 {
      font-size: 32px;
      font-weight: 400;
      margin-bottom: 30px;
    }
    h1 span {
      color: #00ffa3;
    }
    
    /* Chart Cards */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }
    .chart-card {
      background: #111;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #222;
    }
    .chart-title {
      font-size: 18px;
      margin-bottom: 20px;
      color: #fff;
    }
    .chart-container {
      position: relative;
      height: 300px;
    }
    
    /* Stats Overview */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-box {
      background: #111;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-box-value {
      font-size: 28px;
      font-weight: 600;
      color: #00ffa3;
      margin-bottom: 5px;
    }
    .stat-box-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
    }
    
    @media (max-width: 1024px) {
      .chart-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="logo.jpg" alt="PumpChain" onerror="this.style.display='none'">
      <span class="logo-text"><span>Pump</span>Scan</span>
    </a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="blocks.html">Blocks</a>
      <a href="transactions.html">Transactions</a>
      <a href="tokens.html">Tokens</a>
      <a href="charts.html" class="active">Charts</a>
    </nav>
  </header>

  <main class="container">
    <h1><span>Network</span> Charts</h1>
    
    <!-- Stats Overview -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-box-value" id="tps">2,450</div>
        <div class="stat-box-label">Avg TPS</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value" id="blockTime">400ms</div>
        <div class="stat-box-label">Block Time</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value" id="finality">~400ms</div>
        <div class="stat-box-label">Finality</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value" id="epoch">453</div>
        <div class="stat-box-label">Epoch</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">Transactions Per Second (TPS)</div>
        <div class="chart-container">
          <canvas id="tpsChart"></canvas>
        </div>
      </div>
      
      <div class="chart-card">
        <div class="chart-title">Block Production</div>
        <div class="chart-container">
          <canvas id="blockChart"></canvas>
        </div>
      </div>
      
      <div class="chart-card">
        <div class="chart-title">Network Activity (24h)</div>
        <div class="chart-container">
          <canvas id="activityChart"></canvas>
        </div>
      </div>
      
      <div class="chart-card">
        <div class="chart-title">Slot Progress</div>
        <div class="chart-container">
          <canvas id="slotChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Chart.js configuration
    Chart.defaults.color = '#888';
    Chart.defaults.borderColor = '#222';
    
    // Generate sample data
    const labels = Array.from({length: 24}, (_, i) => `${i}:00`);
    const tpsData = Array.from({length: 24}, () => Math.floor(Math.random() * 5000) + 1000);
    const blockData = Array.from({length: 24}, () => Math.floor(Math.random() * 9000) + 1000);
    
    // TPS Chart
    new Chart(document.getElementById('tpsChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'TPS',
          data: tpsData,
          borderColor: '#00ffa3',
          backgroundColor: 'rgba(0, 255, 163, 0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } }
      }
    });
    
    // Block Chart
    new Chart(document.getElementById('blockChart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Blocks',
          data: blockData,
          backgroundColor: '#03e1ff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } }
      }
    });
    
    // Activity Chart
    new Chart(document.getElementById('activityChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Transactions',
          data: tpsData.map(x => x * 60),
          borderColor: '#9945FF',
          backgroundColor: 'rgba(153, 69, 255, 0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } }
      }
    });
    
    // Slot Chart
    new Chart(document.getElementById('slotChart'), {
      type: 'doughnut',
      data: {
        labels: ['Completed', 'Remaining'],
        datasets: [{
          data: [65, 35],
          backgroundColor: ['#00ffa3', '#222'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '70%'
      }
    });
  </script>
</body>
</html>
