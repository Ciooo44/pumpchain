<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bridge | PumpChain</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
    }
    .logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #00ffa3;
    }
    h1 {
      font-size: 24px;
      font-weight: 400;
    }
    h1 span {
      color: #00ffa3;
    }
    
    .bridge-card {
      background: #111;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
    }
    
    .wallet-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .wallet-box:hover {
      border: 1px solid #00ffa3;
    }
    .wallet-box.connected {
      background: rgba(0, 255, 163, 0.1);
      border: 1px solid #00ffa3;
    }
    
    .chain-select {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 15px;
      align-items: center;
      margin-bottom: 25px;
    }
    .chain-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .chain-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    .chain-name {
      font-size: 18px;
      font-weight: 500;
    }
    .swap-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #00ffa3;
      border: none;
      color: #000;
      font-size: 20px;
      cursor: pointer;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .input-wrap {
      position: relative;
    }
    input {
      width: 100%;
      padding: 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #00ffa3;
    }
    .token-badge {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: #333;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
    }
    
    .bridge-info {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-label {
      color: #888;
      font-size: 13px;
    }
    .info-value {
      color: #00ffa3;
      font-size: 13px;
    }
    
    .bridge-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #00ffa3, #03e1ff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .bridge-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="logo.jpg" alt="Logo" class="logo" onerror="this.style.display='none'">
      <h1><span>Bridge</span></h1>
    </div>
    
    <div class="bridge-card">
      <div class="wallet-box" id="walletBox" onclick="connectWallet()">
        <div id="walletText">Click to connect wallet</div>
      </div>
      
      <div class="chain-select">
        <div class="chain-box">
          <div class="chain-label">From</div>
          <div class="chain-name">Solana</div>
        </div>
        <button class="swap-btn" onclick="swapChains()">⇄</button>
        <div class="chain-box">
          <div class="chain-label">To</div>
          <div class="chain-name" style="color: #00ffa3;">PumpChain</div>
        </div>
      </div>
      
      <div class="form-group">
        <label>Amount</label>
        <div class="input-wrap">
          <input type="number" id="amount" placeholder="0.00" step="0.001">
          <span class="token-badge">SOL</span>
        </div>
      </div>
      
      <div class="bridge-info">
        <div class="info-row">
          <span class="info-label">Bridge Fee</span>
          <span class="info-value">0.001 SOL</span>
        </div>
        <div class="info-row">
          <span class="info-label">You will receive</span>
          <span class="info-value" id="receiveAmount">0.00 PUMPC</span>
        </div>
      </div>
      
      <button class="bridge-btn" id="bridgeBtn" onclick="bridgeAssets()" disabled>
        Bridge Assets
      </button>
    </div>
  </div>

  <script>
    let wallet = null;
    
    async function connectWallet() {
      try {
        if (window.phantom?.solana) {
          const resp = await window.phantom.solana.connect();
          wallet = window.phantom.solana;
        } else if (window.solflare) {
          await window.solflare.connect();
          wallet = window.solflare;
        } else {
          alert('Please install Phantom or Solflare wallet');
          return;
        }
        
        document.getElementById('walletBox').classList.add('connected');
        document.getElementById('walletText').textContent = wallet.publicKey.toString().slice(0, 6) + '...' + wallet.publicKey.toString().slice(-4);
        document.getElementById('bridgeBtn').disabled = false;
      } catch (e) {
        console.error(e);
      }
    }
    
    function swapChains() {
      document.querySelector('.swap-btn').style.transform = 'rotate(180deg)';
      setTimeout(() => document.querySelector('.swap-btn').style.transform = '', 300);
    }
    
    document.getElementById('amount').addEventListener('input', (e) => {
      const amount = parseFloat(e.target.value) || 0;
      document.getElementById('receiveAmount').textContent = (amount * 1000).toFixed(2) + ' PUMPC';
    });
    
    function bridgeAssets() {
      const btn = document.getElementById('bridgeBtn');
      btn.textContent = 'Processing...';
      setTimeout(() => {
        alert('Bridge initiated! Check your wallet for confirmation.');
        btn.textContent = 'Bridge Assets';
      }, 2000);
    }
  </script>
</body>
</html>
