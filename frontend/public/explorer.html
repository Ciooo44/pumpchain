<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorer | PumpChain</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚀%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00FFA3;
      --cyan: #03E1FF;
      --purple: #9945FF;
      --pink: #FF3CAC;
      --bg: #04040C;
      --bg2: #080818;
      --bg3: #0D0D22;
      --border: rgba(0,255,163,0.12);
      --text: #E8E8F0;
      --muted: #6B6B8A;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0; opacity:.4;
    }
    
    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(4,4,12,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.2rem;
      text-decoration: none;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
    }
    
    .logo-text {
      background: linear-gradient(90deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .nav-links {
      display: flex;
      gap: 8px;
    }
    
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    
    .nav-links a:hover {
      color: var(--green);
      border-color: var(--border);
      background: rgba(0,255,163,0.05);
    }
    
    .nav-links a.active {
      color: var(--green);
      border-color: rgba(0,255,163,0.3);
      background: rgba(0,255,163,0.07);
    }
    
    .nav-wallet {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    
    .nav-wallet:hover {
      color: var(--green);
      border-color: rgba(0,255,163,0.3);
    }
    
    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 24px 60px;
      position: relative;
      z-index: 1;
    }
    
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* Search Box */
    .search-section {
      margin-bottom: 32px;
    }
    
    .search-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
      display: flex;
      gap: 8px;
      max-width: 700px;
    }
    
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
    }
    
    .search-box input:focus {
      outline: none;
    }
    
    .search-box input::placeholder {
      color: var(--muted);
    }
    
    .search-btn {
      padding: 12px 28px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .search-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,255,163,0.3);
    }
    
    .search-filters {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    
    .search-filter {
      padding: 6px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .search-filter:hover,
    .search-filter.active {
      color: var(--green);
      border-color: rgba(0,255,163,0.3);
      background: rgba(0,255,163,0.07);
    }
    
    /* Search Results */
    .search-results {
      display: none;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      animation: slideDown 0.3s ease;
    }
    
    .search-results.show {
      display: block;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .results-title {
      font-size: 1rem;
      font-weight: 700;
    }
    
    .results-count {
      font-size: 0.8rem;
      color: var(--muted);
    }
    
    .result-item {
      padding: 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .result-item:hover {
      border-color: rgba(0,255,163,0.3);
      transform: translateX(4px);
    }
    
    .result-type {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(0,255,163,0.1);
      border: 1px solid rgba(0,255,163,0.2);
      border-radius: 6px;
      font-size: 0.7rem;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .result-type.tx { 
      background: rgba(3,225,255,0.1); 
      border-color: rgba(3,225,255,0.2); 
      color: var(--cyan); 
    }
    
    .result-type.address { 
      background: rgba(153,69,255,0.1); 
      border-color: rgba(153,69,255,0.2); 
      color: var(--purple); 
    }
    
    .result-hash {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 4px;
    }
    
    .result-details {
      font-size: 0.8rem;
      color: var(--muted);
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.2s;
    }
    
    .stat-card:hover {
      border-color: rgba(0,255,163,0.2);
      transform: translateY(-2px);
    }
    
    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--green);
      font-family: 'Space Mono', monospace;
    }
    
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }
    
    .stat-change {
      font-size: 0.75rem;
      margin-top: 4px;
    }
    
    .stat-change.positive { color: var(--green); }
    .stat-change.negative { color: #FF4444; }
    
    /* Section Title */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--cyan);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--green);
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    
    .view-all {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .view-all:hover {
      color: var(--green);
    }
    
    /* Blocks Table */
    .blocks-table {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .table-header {
      display: grid;
      grid-template-columns: 100px 1fr 150px 100px 80px;
      padding: 16px 20px;
      background: var(--bg3);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    
    .table-row {
      display: grid;
      grid-template-columns: 100px 1fr 150px 100px 80px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      font-family: 'Space Mono', monospace;
      transition: all 0.2s;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .table-row:hover {
      background: rgba(0,255,163,0.03);
    }
    
    .block-num {
      color: var(--green);
      cursor: pointer;
    }
    
    .block-num:hover {
      text-decoration: underline;
    }
    
    .tx-hash {
      color: var(--cyan);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .time {
      color: var(--muted);
      font-size: 0.8rem;
    }
    
    .tx-count {
      color: var(--green);
    }
    
    .block-reward {
      color: var(--purple);
      font-size: 0.8rem;
    }
    
    /* Loading State */
    .loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--muted);
    }
    
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Block Detail Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    
    .modal-overlay.show {
      display: flex;
    }
    
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px;
    }
    
    .modal-close:hover {
      color: var(--text);
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    
    .detail-row:last-child {
      border-bottom: none;
    }
    
    .detail-label {
      color: var(--muted);
    }
    
    .detail-value {
      font-family: 'Space Mono', monospace;
      color: var(--text);
    }
    
    .detail-value.highlight {
      color: var(--green);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      nav {
        padding: 14px 20px;
      }
      
      .nav-links {
        display: none;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .table-header,
      .table-row {
        grid-template-columns: 80px 1fr 80px;
        font-size: 0.8rem;
      }
      
      .table-header > :nth-child(2),
      .table-row > :nth-child(2),
      .table-header > :nth-child(4),
      .table-row > :nth-child(4) {
        display: none;
      }
      
      .search-box {
        flex-direction: column;
      }
      
      .search-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00FFA3"/>
            <stop offset="1" stop-color="#03E1FF"/>
          </linearGradient>
        </defs>
        <path d="M6 26V6H18C23.5 6 26 9 26 13C26 17 23.5 20 18 20H11V26H6Z" fill="url(#lg)"/>
        <path d="M11 10H17.5C20.5 10 21.5 11.5 21.5 13C21.5 14.5 20.5 16 17.5 16H11V10Z" fill="#04040C"/>
      </svg>
      <span class="logo-text">PumpChain</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="launchpad.html">Launchpad</a>
      <a href="bridge.html">Bridge</a>
      <a href="explorer.html" class="active">Explorer</a>
    </div>
    <a href="connect.html" class="nav-wallet">🔌 Connect</a>
  </nav>

  <div class="container">
    <h1>🔍 Block Explorer</h1>

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by address, tx hash, block number, or token...">
        <button class="search-btn" onclick="search()">Search</button>
      </div>
      <div class="search-filters">
        <span class="search-filter active" onclick="setFilter('all')">All</span>
        <span class="search-filter" onclick="setFilter('tx')">Transactions</span>
        <span class="search-filter" onclick="setFilter('block')">Blocks</span>
        <span class="search-filter" onclick="setFilter('address')">Addresses</span>
        <span class="search-filter" onclick="setFilter('token')">Tokens</span>
      </div>
    </div>

    <!-- Search Results -->
    <div class="search-results" id="searchResults">
      <div class="results-header">
        <span class="results-title">Search Results</span>
        <span class="results-count" id="resultsCount">0 found</span>
      </div>
      <div id="resultsList"></div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="latestBlock">52,345,678</div>
        <div class="stat-label">Latest Block</div>
        <div class="stat-change positive">+2.4s ago</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalTx">12.4M</div>
        <div class="stat-label">Total Txs</div>
        <div class="stat-change positive">+1,247</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="tps">47,832</div>
        <div class="stat-label">TPS</div>
        <div class="stat-change positive">+2.3%</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avgFee">$0.001</div>
        <div class="stat-label">Avg Fee</div>
        <div class="stat-change negative">-12%</div>
      </div>
    </div>

    <!-- Latest Blocks -->
    <div class="section-header">
      <div class="section-title">
        Latest Blocks
        <span class="live-indicator">
          <span class="live-dot"></span>
          LIVE
        </span>
      </div>
      <a href="#" class="view-all" onclick="alert('Full block history coming soon!')">View All →</a>
    </div>
    
    <div class="blocks-table">
      <div class="table-header">
        <div>Block</div>
        <div>Hash</div>
        <div>Time</div>
        <div>Txs</div>
        <div>Reward</div>
      </div>
      <div id="blocksList"></div>
    </div>
  </div>

  <!-- Block Detail Modal -->
  <div class="modal-overlay" id="blockModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Block Details</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <script>
    let currentBlock = 52345678;
    let currentFilter = 'all';
    const blocks = [];
    
    // Initialize with some blocks
    for (let i = 0; i < 10; i++) {
      blocks.push(generateBlock(currentBlock - i));
    }
    
    function generateBlock(height) {
      const txCount = Math.floor(Math.random() * 1500) + 200;
      const hash = 'pump' + Math.random().toString(36).substring(2, 6) + '...' + 
                   Math.random().toString(36).substring(2, 6);
      return {
        height: height,
        hash: hash,
        timestamp: new Date(Date.now() - (currentBlock - height) * 400),
        txCount: txCount,
        reward: (Math.random() * 0.5 + 0.1).toFixed(4),
        size: Math.floor(Math.random() * 50000) + 10000,
        validator: 'pump' + Math.random().toString(36).substring(2, 10)
      };
    }
    
    function renderBlocks() {
      const list = document.getElementById('blocksList');
      list.innerHTML = blocks.map((block, index) => `
        <div class="table-row" style="animation-delay: ${index * 0.05}s">
          <div class="block-num" onclick="showBlockDetails(${block.height})">#${block.height.toLocaleString()}</div>
          <div class="tx-hash">${block.hash}</div>
          <div class="time">${formatTime(block.timestamp)}</div>
          <div class="tx-count">${block.txCount.toLocaleString()}</div>
          <div class="block-reward">${block.reward} PUMPC</div>
        </div>
      `).join('');
    }
    
    function formatTime(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return seconds + ' secs ago';
      if (seconds < 3600) return Math.floor(seconds / 60) + ' mins ago';
      return Math.floor(seconds / 3600) + ' hours ago';
    }
    
    function addNewBlock() {
      currentBlock++;
      const newBlock = generateBlock(currentBlock);
      blocks.unshift(newBlock);
      if (blocks.length > 20) blocks.pop();
      
      renderBlocks();
      
      // Update stats
      document.getElementById('latestBlock').textContent = currentBlock.toLocaleString();
      document.getElementById('totalTx').textContent = (12.4 + currentBlock / 1000000).toFixed(1) + 'M';
      
      // Random TPS fluctuation
      const tps = Math.floor(Math.random() * 10000 + 40000);
      document.getElementById('tps').textContent = tps.toLocaleString();
    }
    
    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) {
        alert('Please enter a search query!');
        return;
      }
      
      const resultsDiv = document.getElementById('searchResults');
      const resultsList = document.getElementById('resultsList');
      const resultsCount = document.getElementById('resultsCount');
      
      // Generate mock results based on query
      const results = generateSearchResults(query);
      
      if (results.length === 0) {
        resultsList.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--muted);">No results found</div>';
      } else {
        resultsList.innerHTML = results.map(r => `
          <div class="result-item" onclick="handleResultClick('${r.type}', '${r.id}')">
            <span class="result-type ${r.type}">${r.type}</span>
            <div class="result-hash">${r.hash}</div>
            <div class="result-details">${r.details}</div>
          </div>
        `).join('');
      }
      
      resultsCount.textContent = results.length + ' found';
      resultsDiv.classList.add('show');
    }
    
    function generateSearchResults(query) {
      const results = [];
      
      // Check if it looks like a block number
      if (/^\d+$/.test(query)) {
        results.push({
          type: 'block',
          id: query,
          hash: '#' + parseInt(query).toLocaleString(),
          details: 'Block height • 1,234 transactions • 2 mins ago'
        });
      }
      
      // Check if it looks like a transaction hash
      if (query.length > 10) {
        results.push({
          type: 'tx',
          id: query,
          hash: 'pump' + query.substring(0, 20) + '...',
          details: 'Transfer • 100 PUMPC • Success • 5 secs ago'
        });
      }
      
      // Check if it looks like an address
      if (query.startsWith('0x') || query.length > 20) {
        results.push({
          type: 'address',
          id: query,
          hash: query.substring(0, 20) + '...',
          details: 'Account • Balance: 1,234 PUMPC • 567 transactions'
        });
      }
      
      // Always add some token results for demo
      results.push({
        type: 'token',
        id: 'PUMPC',
        hash: 'PUMPC Token',
        details: 'PumpChain Native • 1B Supply • $0.0042'
      });
      
      return results;
    }
    
    function handleResultClick(type, id) {
      if (type === 'block') {
        showBlockDetails(parseInt(id));
      } else {
        alert(`${type.toUpperCase()} Details

ID: ${id}

Full details page coming soon!`);
      }
    }
    
    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.search-filter').forEach(f => f.classList.remove('active'));
      event.target.classList.add('active');
    }
    
    function showBlockDetails(height) {
      const block = blocks.find(b => b.height === height) || generateBlock(height);
      
      document.getElementById('modalTitle').textContent = 'Block #' + height.toLocaleString();
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-row">
          <span class="detail-label">Block Hash</span>
          <span class="detail-value">${block.hash.replace('...', '')}${Math.random().toString(36).substring(2, 10)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Timestamp</span>
          <span class="detail-value">${block.timestamp.toISOString()}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Transactions</span>
          <span class="detail-value highlight">${block.txCount.toLocaleString()}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Size</span>
          <span class="detail-value">${(block.size / 1024).toFixed(2)} KB</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Block Reward</span>
          <span class="detail-value highlight">${block.reward} PUMPC</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Validator</span>
          <span class="detail-value">${block.validator}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Confirmations</span>
          <span class="detail-value highlight">Finalized ✓</span>
        </div>
      `;
      
      document.getElementById('blockModal').classList.add('show');
    }
    
    function closeModal(e) {
      if (!e || e.target === document.getElementById('blockModal')) {
        document.getElementById('blockModal').classList.remove('show');
      }
    }
    
    // Enter key support for search
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        search();
      }
    });
    
    // Initialize
    renderBlocks();
    
    // Add new block every 5 seconds
    setInterval(addNewBlock, 5000);
    
    // Update TPS randomly
    setInterval(() => {
      const tps = Math.floor(Math.random() * 10000 + 40000);
      document.getElementById('tps').textContent = tps.toLocaleString();
    }, 3000);
  </script>
</body>
</html>
